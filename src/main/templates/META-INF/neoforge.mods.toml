modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

# The [[mixins]] block allows you to declare your mixin config to FML so that it gets loaded.
[[mixins]]
config="${mod_id}.mixins.json"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    description='''${mod_description}'''
    authors="${mod_authors}"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
modId = "jei"
type = "optional"
versionRange = "[19,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "emi"
type = "optional"
versionRange = "[1.0,)"
ordering = "NONE"
side = "CLIENT"
